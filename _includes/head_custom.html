<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@{{ site.mermaid.version | default: "10.6.0" }}/dist/mermaid.esm.min.mjs';

  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    securityLevel: 'loose',
    themeVariables: {
      background: '#faf6ed',
      primaryColor: '#e8e0d0',
      primaryTextColor: '#333333',
      primaryBorderColor: '#c4b99a',
      lineColor: '#8b7d6b',
      secondaryColor: '#f0e8d8',
      tertiaryColor: '#f5f0e5',
      fontFamily: 'Georgia, serif'
    },
    flowchart: {
      useMaxWidth: true,
      htmlLabels: true
    }
  });

  // Module scripts run after DOM is parsed, so no DOMContentLoaded needed.
  // kramdown renders ```mermaid as <pre><code class="language-mermaid">;
  // convert to <div class="mermaid"> which Mermaid expects.
  document.querySelectorAll('code.language-mermaid').forEach(function(codeEl) {
    var pre = codeEl.parentElement;
    var div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = codeEl.textContent;
    pre.parentElement.replaceChild(div, pre);
  });

  await mermaid.run();
</script>
