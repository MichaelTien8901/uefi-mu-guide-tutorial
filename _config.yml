title: "UEFI Project Mu Development Guide"
description: "A comprehensive tutorial and reference for UEFI firmware development using Microsoft's Project Mu framework"
baseurl: "/uefi-mu-guide-tutorial"
url: ""

theme: just-the-docs

color_scheme: dark

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/

# Mermaid
mermaid:
  version: "10.6.0"

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Callouts
callouts:
  warning:
    title: Warning
    color: yellow
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: red

# Aux links (top right)
aux_links:
  "View on GitHub":
    - "https://github.com/MichaelTien8901/uefi-mu-guide-tutorial"

aux_links_new_tab: true

# Footer
footer_content: "UEFI Project Mu Development Guide. Last updated: March 2026. Built with <a href=\"https://just-the-docs.com\">just-the-docs</a>."

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Plugins
plugins:
  - jekyll-seo-tag

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - examples/
  - .github/
  - README.md
